{% extends 'core/base.html' %}

{% block content %}
<div class="card">
    <h1>Mark Attendance</h1>
    <p>Supervisors may record attendance only for their assigned students.</p>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Save Attendance</button>
    </form>
</div>
{% endblock %}
