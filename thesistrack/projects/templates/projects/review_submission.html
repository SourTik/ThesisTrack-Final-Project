{% extends 'core/base.html' %}

{% block content %}
<div class="card">
    <h1>Review Submission</h1>
    <p>{{ submission.project.title }}</p>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Post Feedback</button>
    </form>
</div>
{% endblock %}
