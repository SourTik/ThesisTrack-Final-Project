{% extends 'core/base.html' %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="bg-slate-900 border border-slate-800 rounded-3xl p-8 shadow-2xl">
        <div class="mb-8">
            <h2 class="text-3xl font-extrabold text-white">Submit Project Proposal</h2>
            <p class="text-slate-400 mt-2">Fill in the details to begin your research verification.</p>
        </div>

        <form method="post" class="space-y-6">
            {% csrf_token %}
            
            <div>
                <label class="block text-slate-300 text-sm font-semibold mb-2 ml-1">Project Title</label>
                <input type="text" name="title" required placeholder="Enter a descriptive title..."
                    class="w-full bg-slate-800 border border-slate-700 text-white px-4 py-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition">
            </div>

            <div>
                <label class="block text-slate-300 text-sm font-semibold mb-2 ml-1">Abstract / Summary</label>
                <textarea name="abstract" rows="5" required placeholder="Briefly describe your research goals..."
                    class="w-full bg-slate-800 border border-slate-700 text-white px-4 py-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition"></textarea>
            </div>

            <div>
                <label class="block text-slate-300 text-sm font-semibold mb-2 ml-1">Supervisor</label>
                <div class="relative">
                    <select name="supervisor" required
                        class="w-full bg-slate-800 border border-slate-700 text-white px-4 py-3 rounded-xl appearance-none focus:outline-none focus:ring-2 focus:ring-indigo-500 transition cursor-pointer">
                        <option value="" disabled selected>Select a supervisor</option>
                        {% for supervisor in supervisors %}
                            <option value="{{ supervisor.id }}">{{ supervisor.name }}</option>
                        {% endfor %}
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-slate-400">
                        <svg class="h-4 w-4 fill-current" viewBox="0 0 20 20"><path d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z"/></svg>
                    </div>
                </div>
            </div>

            <div class="pt-4 flex items-center space-x-4">
                <button type="submit" class="flex-1 bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 rounded-xl shadow-lg shadow-indigo-500/20 transition-all transform hover:-translate-y-0.5">
                    Submit Proposal
                </button>
                <a href="{% url 'projects:project-list' %}" class="px-6 py-3 text-slate-400 hover:text-white font-semibold transition">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
