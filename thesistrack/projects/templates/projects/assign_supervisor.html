{% extends 'core/base.html' %}

{% block content %}
<div class="mx-auto max-w-2xl">
    <div class="rounded-[2rem] bg-white p-8 shadow-sm ring-1 ring-black/5">
        <h1 class="text-2xl font-black text-slate-900">Assign Supervisor</h1>
        <p class="mt-2 text-sm text-slate-600">Project: {{ project.title }}</p>
        <form method="post" class="mt-6 space-y-4">
            {% csrf_token %}
            {{ form.as_p }}
            <div class="pt-2">
                <button type="submit" class="bg-[#800000] px-5 py-3 rounded-xl text-white font-bold">Assign</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
