{% extends 'core/base.html' %}

{% block content %}
<div class="card">
    <h1>Submit DOCX for {{ project.title }}</h1>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Upload</button>
    </form>
</div>
{% endblock %}
