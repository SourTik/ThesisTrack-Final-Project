{% extends 'core/base.html' %}

{% block content %}
<div class="mx-auto max-w-2xl">
    <div class="rounded-[2rem] bg-white p-8 shadow-sm ring-1 ring-black/5">
        <div class="mb-6">
            <h2 class="text-3xl font-extrabold text-slate-900">Create User</h2>
            <p class="text-slate-600 mt-2">Administrators and superusers can create staff and student accounts here.</p>
        </div>

        <form method="post" class="space-y-6">
            {% csrf_token %}
            {{ form.as_p }}
            <div class="pt-4 flex items-center space-x-4">
                <button type="submit" class="flex-1 bg-[#800000] hover:bg-[#6f0000] text-white font-bold py-3 rounded-xl shadow-[0_10px_24px_rgba(128,0,0,0.2)] transition-all">
                    Create User
                </button>
                <a href="{% url 'dashboard:admin-dashboard' %}" class="px-6 py-3 text-slate-500 hover:text-[#800000] font-semibold transition">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
