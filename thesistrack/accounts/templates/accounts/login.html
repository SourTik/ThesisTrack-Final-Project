{% extends 'core/base.html' %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-[#0f172a] p-6">
    <div class="max-w-md w-full bg-slate-900 border border-slate-800 rounded-3xl shadow-2xl overflow-hidden">
        <div class="p-8">
            <div class="text-center mb-10">
                <h1 class="text-3xl font-extrabold text-white tracking-tight">Thesis<span class="text-indigo-500">Track</span></h1>
                <p class="text-slate-400 mt-2 text-sm">Sign in to manage your research</p>
            </div>

            <form method="post" class="space-y-6">
                {% csrf_token %}
                
                {% if form.errors %}
                <div class="bg-rose-500/10 border border-rose-500/50 text-rose-500 p-3 rounded-xl text-xs">
                    Invalid username or password.
                </div>
                {% endif %}

                <div>
                    <label class="block text-slate-300 text-sm font-semibold mb-2 ml-1">Username</label>
                    <input type="text" name="username" required
                        class="w-full bg-slate-800 border border-slate-700 text-white px-4 py-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition">
                </div>

                <div>
                    <label class="block text-slate-300 text-sm font-semibold mb-2 ml-1">Password</label>
                    <input type="password" name="password" required
                        class="w-full bg-slate-800 border border-slate-700 text-white px-4 py-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition">
                </div>

                <button type="submit" 
                    class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 rounded-xl shadow-lg shadow-indigo-500/20 transition-all transform hover:-translate-y-0.5">
                    Sign In
                </button>
            </form>

            <div class="mt-8 text-center">
                <p class="text-slate-500 text-xs">
                    <span class="block">Administrator access only.</span>
                    Account creation is handled by the university department.
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}s
