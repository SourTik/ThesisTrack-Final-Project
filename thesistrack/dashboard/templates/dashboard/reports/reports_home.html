{% extends 'dashboard/reports/base_reports.html' %}

{% block report_content %}
<div class="grid gap-6 md:grid-cols-2 xl:grid-cols-5">
    <div class="rounded-3xl bg-white p-6 shadow-sm ring-1 ring-black/5">
        <p class="text-[10px] uppercase tracking-widest text-slate-400">Total Projects</p>
        <p class="mt-2 text-3xl font-black text-slate-950">{{ total_projects }}</p>
    </div>
    <div class="rounded-3xl bg-white p-6 shadow-sm ring-1 ring-black/5">
        <p class="text-[10px] uppercase tracking-widest text-slate-400">Total Submissions</p>
        <p class="mt-2 text-3xl font-black text-slate-950">{{ total_submissions }}</p>
    </div>
    <div class="rounded-3xl bg-white p-6 shadow-sm ring-1 ring-black/5">
        <p class="text-[10px] uppercase tracking-widest text-slate-400">Supervisors</p>
        <p class="mt-2 text-3xl font-black text-slate-950">{{ total_supervisors }}</p>
    </div>
    <div class="rounded-3xl bg-white p-6 shadow-sm ring-1 ring-black/5">
        <p class="text-[10px] uppercase tracking-widest text-slate-400">Pending Titles</p>
        <p class="mt-2 text-3xl font-black text-slate-950">{{ pending_titles }}</p>
    </div>
    <div class="rounded-3xl bg-white p-6 shadow-sm ring-1 ring-black/5">
        <p class="text-[10px] uppercase tracking-widest text-slate-400">Pending Reviews</p>
        <p class="mt-2 text-3xl font-black text-slate-950">{{ pending_reviews }}</p>
    </div>
</div>
{% endblock %}
