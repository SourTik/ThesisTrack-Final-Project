{% extends 'dashboard/reports/base_reports.html' %}

{% block report_content %}
<div class="grid gap-6 md:grid-cols-2 xl:grid-cols-5">
    <div class="rounded-2xl border border-slate-800 bg-slate-900 p-5">
        <p class="text-xs uppercase tracking-widest text-slate-500">Total Projects</p>
        <p class="mt-2 text-2xl font-bold text-white">{{ total_projects }}</p>
    </div>
    <div class="rounded-2xl border border-slate-800 bg-slate-900 p-5">
        <p class="text-xs uppercase tracking-widest text-slate-500">Total Submissions</p>
        <p class="mt-2 text-2xl font-bold text-white">{{ total_submissions }}</p>
    </div>
    <div class="rounded-2xl border border-slate-800 bg-slate-900 p-5">
        <p class="text-xs uppercase tracking-widest text-slate-500">Supervisors</p>
        <p class="mt-2 text-2xl font-bold text-white">{{ total_supervisors }}</p>
    </div>
    <div class="rounded-2xl border border-slate-800 bg-slate-900 p-5">
        <p class="text-xs uppercase tracking-widest text-slate-500">Pending Titles</p>
        <p class="mt-2 text-2xl font-bold text-white">{{ pending_titles }}</p>
    </div>
    <div class="rounded-2xl border border-slate-800 bg-slate-900 p-5">
        <p class="text-xs uppercase tracking-widest text-slate-500">Pending Reviews</p>
        <p class="mt-2 text-2xl font-bold text-white">{{ pending_reviews }}</p>
    </div>
</div>
{% endblock %}
