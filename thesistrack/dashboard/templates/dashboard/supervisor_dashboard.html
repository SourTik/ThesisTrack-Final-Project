{% extends 'core/base.html' %}

{% block content %}
<div class="space-y-8">
    <div>
        <h1 class="text-3xl font-bold text-white">Supervisor Dashboard</h1>
        <p class="text-slate-400 mt-1">Review submissions, approvals, and group progress.</p>
    </div>

    <div class="grid gap-6 md:grid-cols-3">
        <div class="rounded-3xl border border-slate-800 bg-slate-900 p-6">
            <p class="text-xs uppercase tracking-widest text-slate-500">Supervised Projects</p>
            <p class="mt-2 text-2xl font-bold text-white">{{ supervised_projects }}</p>
        </div>
        <div class="rounded-3xl border border-slate-800 bg-slate-900 p-6">
            <p class="text-xs uppercase tracking-widest text-slate-500">Pending Reviews</p>
            <p class="mt-2 text-2xl font-bold text-white">{{ pending_reviews }}</p>
        </div>
        <div class="rounded-3xl border border-slate-800 bg-slate-900 p-6">
            <p class="text-xs uppercase tracking-widest text-slate-500">Notifications</p>
            <p class="mt-2 text-2xl font-bold text-white">{{ unread_notifications }}</p>
        </div>
    </div>
</div>
{% endblock %}
